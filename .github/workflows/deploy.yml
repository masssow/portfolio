name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1 — Code source
      - name: Checkout code
        uses: actions/checkout@v3

      # 2 — Cache npm
      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # 3 — Build assets AVANT le déploiement
      - name: Install npm dependencies
        run: npm ci

      - name: Build assets with Webpack Encore
        run: npm run build

      # 4 — Configurer SSH
      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat >> ~/.ssh/config <<-EOF
          Host hostinger
            HostName 178.16.128.226
            User u791166429
            Port 65002
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
          EOF

      # 5 — Déployer le code PHP
      - name: Deploy PHP code
        run: |
          ssh hostinger << 'EOF'
            cd /home/u791166429/domains/massgrafik.com/public_html
            git pull origin main
            composer install --no-dev --optimize-autoloader
            php bin/console cache:clear --env=prod
            php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration --env=prod
          EOF

      # 6 — Envoyer les assets compilés (public/build/) sur le serveur
      - name: Upload built assets
        run: |
          scp -P 65002 -r public/build/ u791166429@178.16.128.226:/home/u791166429/domains/massgrafik.com/public_html/public/
