    titleTab: "Precios — MassGrafik"
  hero:
    eyebrow: "Precios transparentes"
    title: "Ofertas claras, sin sorpresas"
    subtitle: "Muy por debajo de las agencias locales, con la misma calidad de entrega. Sabes lo que pagas antes de empezar."
  cta_all: "Pedir un presupuesto personalizado"
  compare:
    title: "Qué incluye cada oferta"
    col1: "Starter Digital"
    col2: "Pro PME"
    col3: "Business Tool"
    rows:
      1:
        label: "Número de páginas"
        v1: "5 páginas"
        v2: "5 páginas +"
        v3: "A medida"
      2:
        label: "Módulo de gestión de clientes"
        v1: "No"
        v2: "Sí"
        v3: "Sí (avanzado)"
      3:
        label: "Espacio cliente seguro"
        v1: "No"
        v2: "Sí"
        v3: "Sí"
      4:
        label: "Formación incluida"
        v1: "1 h"
        v2: "2 h"
        v3: "4 h + doc."
      5:
        label: "Plazo de entrega"
        v1: "2 – 3 sem."
        v2: "3 – 5 sem."
        v3: "5 – 10 sem."
      6:
        label: "Mantenimiento incluido"
        v1: "No"
        v2: "Opcional"
        v3: "Sí (6 meses)"
  faq:
    title: "Preguntas frecuentes sobre precios"
    items:
      1:
        q: "¿El precio indicado incluye todo?"
        a: "Sí. El precio cubre diseño, desarrollo, alojamiento el primer año y formación. Sin costes ocultos. Si tu necesidad supera el pack, te lo decimos antes de empezar."
      2:
        q: "¿Qué pasa si mi necesidad supera el pack elegido?"
        a: "Empezamos con una consulta de diagnóstico para entender exactamente tu necesidad. Si el pack estándar no es suficiente, elaboramos un presupuesto personalizado. Siempre con control total del coste."
      3:
        q: "¿Ofrecéis facilidades de pago?"
        a: "Sí. Se solicita un 30 % de anticipo al inicio, el resto a la entrega. Para proyectos Business Tool puede plantearse el pago en 3 veces. Consúltalo en tu primera conversación."
      4:
        q: "¿Es obligatorio el mantenimiento?"
        a: "No. Los packs Starter y Pro PME no lo incluyen por defecto. Podemos ofrecerte un contrato de mantenimiento mensual si prefieres delegar las actualizaciones y el seguimiento técnico."
      5:
        q: "¿Trabajáis con asociaciones con presupuesto limitado?"
        a: "Sí. Adaptamos nuestro enfoque a entidades sin ánimo de lucro. Coméntanoslo al contactar — pueden plantearse ajustes según el contexto."

