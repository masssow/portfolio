services2:
  intro:
    title: "Soluciones claras, útiles y adaptadas"
    subtitle: "MassGrafik no solo vende prestaciones técnicas. Cada solución está diseñada para responder a una necesidad de negocio precisa."
  toggle: "Ver el detalle"
  cards:
    web:
      title: "Webs profesionales y presencia digital"
      teaser: "Ser encontrado, entendido y contactado."
      items:
        1: "Web vitrina para presentar claramente tu actividad y tus servicios."
        2: "Rediseño de una web existente para mejorar la imagen y la legibilidad."
        3: "Páginas bien estructuradas: inicio, servicios, sobre nosotros, contacto."
        4: "Diseño limpio, mobile-first y de carga rápida."
        5: "Formulario de contacto y reserva de citas integrados."
        6: "Ficha de Google Business creada u optimizada."
    ecommerce:
      title: "E-commerce y venta online"
      teaser: "Vender fácil, cobrar con tranquilidad."
      items:
        1: "Tienda online adaptada a tu catálogo y tu sector."
        2: "Pago seguro con Stripe o solución equivalente."
        3: "Gestión de pedidos, stock y transportistas."
        4: "Click-and-collect y pedidos con franjas horarias de recogida."
        5: "Suscripciones, membresías o compras recurrentes."
        6: "Puesta en marcha progresiva y acompañamiento al inicio."
    tools:
      title: "Herramientas de gestión sencillas"
      teaser: "Organizarse mejor, hacer mejor seguimiento, ganar tiempo."
      items:
        1: "Seguimiento de solicitudes de clientes y pipeline de gestión."
        2: "Herramienta de seguimiento de reservas o prestaciones."
        3: "Formularios internos de negocio con procesamiento automatizado."
        4: "Cuadros de mando sencillos para visualizar tu actividad."
        5: "Historial de intervenciones o de intercambios con clientes."
        6: "Espacio de gestión accesible desde cualquier dispositivo."
    automation:
      title: "Automatizaciones"
      teaser: "Menos tareas manuales, más tiempo útil."
      items:
        1: "Recepción y tratamiento de solicitudes por formulario inteligente."
        2: "Confirmación automática por e-mail o SMS."
        3: "Notificaciones internas ante nuevas solicitudes."
        4: "Seguimiento de estado automatizado: nuevo, en curso, tratado."
        5: "Centralización y organización de datos recurrentes."
        6: "Simplificación de procesos manuales y repetitivos."
    terrain:
      title: "Seguimiento de intervenciones de campo"
      teaser: "Coordinar oficina y campo sin fricciones."
      items:
        1: "Creación y asignación de intervenciones desde un espacio dedicado."
        2: "Seguimiento del estado en tiempo real: pendiente, en curso, finalizado."
        3: "Centralización de información: lugar, técnico, notas, adjuntos."
        4: "Visibilidad completa sobre el trabajo realizado y pendiente."
        5: "Reducción de intercambios dispersos por teléfono o mensajería."
        6: "Adaptado a pequeñas estructuras con equipos móviles o subcontratistas."
    support:
      title: "Acompañamiento digital"
      teaser: "Clarificar la necesidad antes de construir la solución."
      items:
        1: "Intercambio de diagnóstico para entender tu actividad y tus limitaciones."
        2: "Identificación de los problemas sencillos a resolver primero."
        3: "Propuesta de solución realista adaptada a tu presupuesto."
        4: "Hoja de ruta progresiva: etapas, prioridades y plazos claros."
        5: "Formación sencilla sobre las herramientas entregadas."
        6: "Mantenimiento y evoluciones continuas según tus necesidades."
    booking:
      title: "Reservas y formularios online"
      teaser: "Tus clientes reservan, tú gestionas."
      intro: "Permite que tus clientes reserven una cita o rellenen un formulario estructurado — sin intercambio de mensajes ni pérdida de tiempo."
      items:
        1: "Formulario de reserva de cita integrado en tu web."
        2: "Elección de franjas horarias y confirmación automática por e-mail."
        3: "Recordatorios automáticos antes de la cita."
        4: "Gestión de cancelaciones y cambios desde un panel admin sencillo."
        5: "Sincronización con tu agenda (Google Calendar o equivalente)."
        6: "Resumen diario/semanal de reservas enviado automáticamente."
    content_seo:
      title: "Contenidos, SEO y visibilidad"
      teaser: "Que tus clientes te encuentren antes que a tu competencia."
      intro: "Una buena web también debe ser visible. Optimizamos tu presencia en buscadores y te ayudamos a producir contenido que atrae, informa y convierte."
      items:
        1: "Auditoría SEO técnica de tu web existente."
        2: "Optimización de etiquetas, URLs y estructura de página."
        3: "Ficha de Google Business creada u optimizada."
        4: "Redacción de páginas o artículos orientados a palabras clave locales."
        5: "Estrategia de contenido adaptada a tu sector y público."
        6: "Seguimiento de posiciones y recomendaciones de mejora."
    operations:
      title: "Seguimiento y mantenimiento continuo"
      teaser: "Tu web siempre activa, actualizada y con buen rendimiento."
      intro: "Una vez entregada tu solución, nos encargamos del seguimiento técnico, las actualizaciones y las pequeñas mejoras. Tú gestionas tu actividad — nosotros el resto."
      items:
        1: "Actualizaciones regulares de componentes y seguridad."
        2: "Copias de seguridad automáticas y restauración rápida."
        3: "Monitorización de disponibilidad y rendimiento."
        4: "Correcciones rápidas ante cualquier fallo."
        5: "Pequeñas mejoras y ajustes de contenido incluidos."
        6: "Informe mensual de seguimiento enviado por e-mail."

