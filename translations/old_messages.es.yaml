about:
  seo:
    titleTab: "Sobre nosotros — MassGrafik"

  hero:
    title: "Sobre MassGrafik"
    subtitle: "Un proyecto nacido de una convicción simple: las pequeñas estructuras merecen soluciones digitales realmente adaptadas a su realidad."

  philosophy:
    title: "La filosofía MassGrafik"
    text1: "MassGrafik nació de la observación de un problema recurrente: muchas pequeñas empresas, autónomos, asociaciones y estructuras de campo tienen necesidades digitales reales — pero pocas soluciones concretas, asequibles y adaptadas a su funcionamiento cotidiano."
    text2: "El objetivo no es vender webs o materiales visuales. Es ayudar a las pequeñas estructuras a organizarse mejor, ganar visibilidad y avanzar en su transformación digital — a su ritmo, según sus prioridades y sus limitaciones reales."

  values:
    title: "Lo que guía nuestro enfoque"
    items:
      1:
        title: "Cercanía"
        desc: "Nos tomamos el tiempo de entender tu actividad antes de proponer nada."
        icon: "fa-handshake"
      2:
        title: "Simplicidad"
        desc: "Sin jerga, sin complejidad innecesaria. Soluciones comprensibles y mantenibles."
        icon: "fa-circle-check"
      3:
        title: "Utilidad"
        desc: "Cada entregable responde a una necesidad real. No construimos por construir."
        icon: "fa-bullseye"
      4:
        title: "Progresividad"
        desc: "Empezar simple, entregar útil, mejorar según los retornos y las necesidades reales."
        icon: "fa-stairs"

  forwho:
    title: "¿Para quién?"
    intro: "MassGrafik trabaja con estructuras de todos los tamaños, siempre que tengan una necesidad concreta que resolver:"
    items:
      1: "Pequeñas empresas y pymes"
      2: "Autónomos y profesionales independientes"
      3: "Comerciantes y e-comerciantes"
      4: "Asociaciones y pequeñas instituciones"
      5: "Estructuras con equipos de campo"
      6: "Emprendedores que quieren estructurar su presencia digital"

  cta:
