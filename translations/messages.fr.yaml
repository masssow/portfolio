      title: "Données collectées et finalités"
      1: "Nom, prénom, e-mail, téléphone, entreprise — pour répondre à votre demande de devis et vous recontacter."
      2: "Description de votre projet (champ message) — pour préparer une proposition adaptée."
      3: "Adresse IP et User-Agent — à des fins de sécurité (anti-spam, protection du formulaire) uniquement."
      4: "Cookies de session — nécessaires au fonctionnement technique du site (navigation, sécurité des formulaires)."
      5: "Cookies analytiques (avec votre consentement uniquement) — pour mesurer l'audience et améliorer le site."
    legalbases:
      title: "Bases juridiques (RGPD)"
      value: "Art. 6.1.b — mesures précontractuelles (réponse à votre demande de devis). Art. 6.1.f — intérêt légitime (sécurité, anti-spam). Art. 6.1.a — consentement (cookies analytiques, si vous les acceptez)."
    notused:
      title: "Ce que nous ne faisons pas"
      1: "Nous ne vendons pas vos données."
      2: "Nous ne vous ajoutons pas à une liste marketing sans votre accord."
      3: "Nous ne partageons pas vos informations avec des annonceurs ou des partenaires commerciaux."
      4: "Nous ne vous recontactons que dans le cadre de votre demande ou de la prestation en cours."
    retention:
      title: "Durées de conservation"
      value: "Demandes de devis sans suite : suppression au bout de 12 mois. Données liées à une prestation active : conservées pendant la durée du contrat et les 5 ans suivants (obligations comptables légales). Données de sécurité (logs) : 30 jours maximum. Cookies analytiques : durée définie par l'outil utilisé, au maximum 13 mois."
    rights:
      title: "Vos droits (RGPD)"
      1: "Accès : obtenir une copie de vos données."
      2: "Rectification : corriger des données inexactes."
      3: "Suppression : demander l'effacement de vos données."
      4: "Limitation : suspendre le traitement en cas de contestation."
      5: "Opposition : vous opposer à un traitement basé sur l'intérêt légitime."
      6: "Portabilité : recevoir vos données dans un format structuré."
    howto: "Pour exercer vos droits, écrivez à contact.massgrafik@gmail.com en précisant votre demande. Réponse sous 30 jours. En cas de désaccord persistant, vous pouvez saisir la CNIL (cnil.fr)."
    security:
      title: "Sécurité"
      value: "Le formulaire est protégé contre le spam (honeypot, délai de saisie, limitation du débit). Les données sont stockées sur des serveurs hébergés chez Hostinger (Chypre, UE). L'accès est restreint à Samba SOW, responsable du traitement."
    transfers:
      title: "Sous-traitants et transferts"
      value: "Hostinger International Ltd (hébergement, Chypre — UE) : traitement des données serveur. Gmail/Google (envoi des e-mails de confirmation) : données transitent via les serveurs Google, couverts par les clauses contractuelles types UE. Aucun autre tiers n'a accès à vos données."

  cookies:
    seo:
      titleTab: "Politique de cookies — MassGrafik"
    title: "Politique de cookies"
    intro: "Cette page explique quels cookies sont déposés sur votre appareil lorsque vous visitez massgrafik.com, pourquoi, et comment les contrôler."
    commitment:
      title: "Notre position sur les cookies"
      value: "Nous utilisons le strict minimum. Aucun cookie publicitaire, aucun cookie de suivi inter-sites, aucun partage avec des régies publicitaires. Les seuls cookies analytiques éventuellement déposés le sont uniquement avec votre consentement explicite, et servent exclusivement à améliorer ce site."
    what:
      title: "Qu'est-ce qu'un cookie ?"
      value: "Un cookie est un petit fichier texte enregistré sur votre appareil (ordinateur, téléphone, tablette) par votre navigateur lorsque vous visitez un site. Il peut servir à maintenir une session, mémoriser vos préférences, ou mesurer l'audience du site."
    types:
      title: "Cookies utilisés sur ce site"
      necessary_title: "Cookies strictement nécessaires (sans consentement)"
      necessary_1: "Cookie de session Symfony (PHPSESSID) — maintient votre session de navigation (formulaire, sécurité CSRF). Durée : session (supprimé à la fermeture du navigateur). Aucune donnée personnelle transmise à un tiers."
      necessary_2: "Cookie de consentement cookies (mg_cookie_consent) — mémorise votre choix (accepter/refuser). Durée : 6 mois."
      analytics_title: "Cookies analytiques (avec votre consentement uniquement)"
      analytics_1: "Si vous acceptez, un outil de mesure d'audience peut être activé pour compter les visites et pages consultées de façon anonymisée. Aucun profil individuel n'est constitué. Vous pouvez refuser ou retirer votre consentement à tout moment."
      social_title: "Cookies tiers (boutons de partage)"
      social_1: "Les liens de partage (LinkedIn, X/Twitter, Facebook, WhatsApp) sont de simples liens texte — aucun cookie tiers n'est déposé tant que vous ne cliquez pas dessus. En cliquant, vous êtes redirigé vers le service concerné, qui peut alors déposer ses propres cookies selon sa politique."
    notdeposited:
      title: "Ce que nous ne déposons PAS"
      1: "Aucun cookie publicitaire (retargeting, tracking inter-sites)."
      2: "Aucun cookie de profilage ou de personnalisation commerciale."
      3: "Aucun cookie partagé avec des régies ou annonceurs."
    manage:
      title: "Gérer vos préférences"
      banner: "Lors de votre première visite, un bandeau vous demande votre accord pour les cookies analytiques. Vous pouvez accepter ou refuser en un clic."
      browser: "Vous pouvez également supprimer ou bloquer tous les cookies via les paramètres de votre navigateur :"
      browser_1: "Chrome : Paramètres → Confidentialité → Cookies"
      browser_2: "Firefox : Options → Vie privée → Cookies"
      browser_3: "Safari : Préférences → Confidentialité"
      browser_4: "Edge : Paramètres → Cookies et autorisations de site"
      note: "Bloquer les cookies nécessaires peut nuire au fonctionnement du formulaire de contact."
    contact:
      title: "Questions ?"
      value: "Pour toute question sur les cookies déposés par ce site, écrivez à contact.massgrafik@gmail.com."

