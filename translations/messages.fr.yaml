services:
  seo:
    titleTab: "Services — MassGrafik"
    metaDesc: "Sites web, e-commerce, outils de gestion, réservations en ligne, automatisations, SEO et maintenance. Des solutions digitales sur mesure pour les petites structures."

services2:
  intro:
    title: "Des solutions claires, utiles et adaptées"
    subtitle: "MassGrafik ne vend pas seulement des prestations techniques. Chaque solution est conçue pour répondre à un besoin métier précis."
  toggle: "Voir le détail"
  cards:
    web:
      title: "Sites professionnels et présence digitale"
      teaser: "Être trouvé, compris et contacté."
      intro: "On conçoit votre site en partant de votre activité réelle — pas d'un modèle générique. Résultat : un site que vos clients comprennent dès la première visite, qui rassure et qui génère de vrais contacts."
      items:
        1: "Site vitrine pour présenter clairement votre activité et vos services."
        2: "Refonte d'un site existant pour améliorer l'image et la lisibilité."
        3: "Pages bien structurées : accueil, services, à propos, contact."
        4: "Design propre, mobile-first et rapide à charger."
        5: "Formulaire de contact et prise de rendez-vous intégrés."
        6: "Fiche Google Business créée ou optimisée."
    ecommerce:
      title: "E-commerce et vente en ligne"
      teaser: "Vendre simplement, encaisser sereinement."
      intro: "Vendre en ligne ne devrait pas être compliqué. On met en place une boutique adaptée à votre catalogue, avec un paiement simple et une gestion des commandes sans prise de tête."
      items:
        1: "Boutique en ligne adaptée à votre catalogue et votre secteur."
        2: "Paiement sécurisé avec Stripe ou solution équivalente."
        3: "Gestion des commandes, des stocks et des transporteurs."
        4: "Click-and-collect et commandes avec créneaux de retrait."
        5: "Abonnements, adhésions ou achats récurrents."
        6: "Mise en ligne progressive et accompagnement au démarrage."
    tools:
      title: "Outils de gestion simples"
      teaser: "Mieux organiser, mieux suivre, gagner du temps."
      intro: "Excel, post-its et messagerie instantanée ont leurs limites. On construit des outils simples qui centralisent vos données et automatisent les petites tâches qui font perdre du temps."
      items:
        1: "Suivi des demandes clients et pipeline de gestion."
        2: "Outil de suivi des réservations ou des prestations."
        3: "Formulaires métier internes avec traitement automatisé."
        4: "Tableaux de bord simples pour visualiser votre activité."
        5: "Historique des interventions ou des échanges clients."
        6: "Espace de gestion accessible depuis n'importe quel appareil."
    automation:
      title: "Automatisations"
      teaser: "Moins de tâches manuelles, plus de temps utile."
      intro: "Certaines tâches se répètent tous les jours sans vraiment apporter de valeur. On identifie ces points de friction et on les élimine avec des automatisations légères, sans complexité technique de votre côté."
      items:
        1: "Réception et traitement de demandes via formulaire intelligent."
        2: "Confirmation automatique par e-mail ou SMS."
        3: "Notifications internes lors de nouvelles demandes."
        4: "Suivi de statut automatisé : nouveau, en cours, traité."
        5: "Centralisation et organisation de données récurrentes."
        6: "Simplification de processus manuels et répétitifs."
    terrain:
      title: "Suivi des interventions terrain"
      teaser: "Coordonner bureau et terrain sans friction."
      intro: "Coordonner bureau et équipes mobiles sans perdre d'information, c'est possible. On crée des outils adaptés à votre façon de travailler sur le terrain, accessibles depuis n'importe quel appareil."
      items:
        1: "Création et affectation d'interventions depuis un espace dédié."
        2: "Suivi du statut en temps réel : à faire, en cours, terminé."
        3: "Centralisation des informations : lieu, technicien, notes, pièces jointes."
        4: "Visibilité complète sur le travail réalisé et en attente."
        5: "Réduction des échanges dispersés par téléphone ou messagerie."
        6: "Adapté aux petites structures avec équipes mobiles ou prestataires."
    support:
      title: "Accompagnement digital"
      teaser: "Clarifier le besoin avant de construire la solution."
      intro: "Avant de construire quoi que ce soit, on prend le temps de comprendre votre activité, vos contraintes et vos priorités réelles. Vous repartez avec une feuille de route claire, pas un devis à l'aveugle."
      items:
        1: "Échange de diagnostic pour comprendre votre activité et vos contraintes."
        2: "Identification des problèmes simples à résoudre en priorité."
        3: "Proposition d'une solution réaliste adaptée à votre budget."
        4: "Feuille de route progressive : étapes, priorités et délais clairs."
        5: "Formation simple sur les outils livrés."
        6: "Maintenance et évolutions continues selon vos besoins."
    booking:
      title: "Réservations et formulaires en ligne"
      teaser: "Vos clients réservent, vous gérez."
      intro: "Permettre à vos clients de réserver un créneau, soumettre une demande ou remplir un formulaire structuré — sans échange de messages, sans perte de temps. On met en place un système adapté à votre activité."
      items:
        1: "Formulaire de prise de rendez-vous intégré à votre site."
        2: "Choix de créneaux disponibles et confirmation automatique par e-mail."
        3: "Rappels automatiques avant le rendez-vous (e-mail ou SMS)."
        4: "Gestion des annulations et reports depuis un espace admin simple."
        5: "Synchronisation avec votre agenda (Google Agenda ou équivalent)."
        6: "Récapitulatif des réservations du jour / de la semaine envoyé automatiquement."
    content_seo:
      title: "Contenus, SEO et visibilité"
      teaser: "Être trouvé par vos clients avant vos concurrents."
      intro: "Un bon site doit aussi être visible. On optimise votre présence sur les moteurs de recherche et on vous aide à produire du contenu qui attire, informe et convertit vos visiteurs en clients."
      items:
        1: "Audit SEO technique de votre site existant."
        2: "Optimisation des balises, URLs et structure de page."
        3: "Fiche Google Business créée ou optimisée."
        4: "Rédaction de pages ou d'articles orientés mots-clés locaux."
        5: "Stratégie de contenu adaptée à votre secteur et votre cible."
        6: "Suivi des positions et recommandations d'amélioration continues."
    operations:
      title: "Suivi et maintenance continue"
      teaser: "Votre site toujours en ligne, à jour et performant."
      intro: "Une fois votre solution livrée, on assure le suivi technique, les mises à jour, les sauvegardes et les petites évolutions. Vous gérez votre activité — on s'occupe du reste."
      items:
        1: "Mises à jour régulières des composants et de la sécurité."
        2: "Sauvegardes automatiques et restauration rapide en cas de problème."
        3: "Surveillance de la disponibilité et des performances."
        4: "Correctifs rapides en cas de dysfonctionnement."
        5: "Petites évolutions et ajustements de contenu inclus."
        6: "Rapport mensuel de suivi envoyé par e-mail."
  cta:
    subtitle: "Décrivez votre besoin en quelques mots. On vous répond sous 48 h, sans engagement."
  others:
    title: "Nos autres solutions"
    all: "Voir tous les services"

