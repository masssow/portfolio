tarifs:
  seo:
    titleTab: "Tarifs — MassGrafik"
    metaDesc: "Offres claires et transparentes : Starter Digital dès 990 €, Pro PME, Business Tool sur mesure. Positionnés bien en dessous des agences, avec la même qualité."
  hero:
    eyebrow: "Tarifs transparents"
    title: "Des offres claires, sans mauvaise surprise"
    subtitle: "Positionnés bien en dessous des agences franciliennes, avec la même qualité de livraison. Vous savez ce que vous payez avant de commencer."
  cta_all: "Demander un devis personnalisé"
  compare:
    title: "Ce qui est inclus dans chaque offre"
    col1: "Starter Digital"
    col2: "Pro PME"
    col3: "Business Tool"
    rows:
      1:
        label: "Nombre de pages"
        v1: "5 pages"
        v2: "5 pages +"
        v3: "Sur mesure"
      2:
        label: "Module de gestion clients"
        v1: "Non"
        v2: "Oui"
        v3: "Oui (avancé)"
      3:
        label: "Espace client sécurisé"
        v1: "Non"
        v2: "Oui"
        v3: "Oui"
      4:
        label: "Formation incluse"
        v1: "1 h"
        v2: "2 h"
        v3: "4 h + doc."
      5:
        label: "Délai de livraison"
        v1: "2 – 3 sem."
        v2: "3 – 5 sem."
        v3: "5 – 10 sem."
      6:
        label: "Maintenance incluse"
        v1: "Non"
        v2: "En option"
        v3: "Oui (6 mois)"
  faq:
    title: "Questions fréquentes sur les tarifs"
    items:
      1:
        q: "Le prix affiché est-il vraiment tout compris ?"
        a: "Oui. Le prix indiqué comprend la conception, le développement, l'hébergement la première année et la formation. Aucun surcoût caché. Si votre besoin dépasse le cadre du pack, on vous le dit avant de commencer."
      2:
        q: "Que se passe-t-il si mon besoin dépasse le pack choisi ?"
        a: "On commence par un échange de diagnostic pour cerner précisément votre besoin. Si le pack standard ne suffit pas, on établit un devis sur mesure. Vous restez toujours informé et en maîtrise du budget."
      3:
        q: "Proposez-vous des facilités de paiement ?"
        a: "Oui. Un acompte de 30 % est demandé au démarrage, le solde à la livraison. Pour les projets Business Tool, un paiement en 3 fois peut être envisagé. Demandez-le lors de votre échange de diagnostic."
      4:
        q: "La maintenance est-elle obligatoire ?"
        a: "Non. Les packs Starter et Pro PME ne l'incluent pas par défaut. On peut néanmoins vous proposer un contrat de maintenance mensuel si vous souhaitez déléguer les mises à jour et le suivi technique."
      5:
        q: "Travaillez-vous avec des associations à budget limité ?"
        a: "Oui. On adapte notre approche aux structures à but non lucratif. N'hésitez pas à nous en parler lors de votre prise de contact — des ajustements sont possibles selon le contexte."

# ===================================================================
# PAGE À PROPOS
# ===================================================================
about:
  seo:
    titleTab: "À propos — MassGrafik"
    metaDesc: "Samba SOW, fondateur de MassGrafik, accompagne les artisans, commerçants et petites structures dans leur transformation digitale depuis Paris. Zones : IDF, Espagne, Sénégal."

  hero:
    title: "À propos de MassGrafik"
    subtitle: "Un projet né d'une conviction simple : les petites structures méritent des solutions digitales vraiment adaptées à leur réalité."

  philosophy:
    title: "La philosophie MassGrafik"
    text1: "MassGrafik est né de l'observation d'un problème récurrent : beaucoup de petites entreprises, d'artisans, d'associations et de structures de terrain ont des besoins digitaux réels — mais peu de solutions concrètes, abordables et adaptées à leur fonctionnement quotidien."
    text2: "L'objectif n'est pas de vendre des sites ou des visuels. C'est d'aider les petites structures à mieux s'organiser, à gagner en visibilité et à avancer dans leur transformation digitale — à leur rythme, selon leurs priorités et leurs contraintes réelles."

  values:
    title: "Ce qui guide notre approche"
    items:
      1:
        title: "Proximité"
        desc: "On prend le temps de comprendre votre activité avant de proposer quoi que ce soit."
        icon: "fa-handshake"
      2:
        title: "Simplicité"
        desc: "Pas de jargon, pas de complexité inutile. Des solutions compréhensibles et maintenables."
        icon: "fa-circle-check"
      3:
        title: "Utilité"
        desc: "Chaque livrable répond à un besoin réel. On ne construit pas pour construire."
        icon: "fa-bullseye"
      4:
        title: "Progressivité"
        desc: "Commencer simple, livrer utile, améliorer selon les retours et les besoins réels."
        icon: "fa-stairs"

  forwho:
    title: "Pour qui ?"
    intro: "MassGrafik travaille avec des structures de toutes tailles, tant qu'elles ont un besoin concret à résoudre :"
    items:
      1: "Petites entreprises et PME"
      2: "Artisans et indépendants"
      3: "Commerçants et e-commerçants"
      4: "Associations et petites institutions"
      5: "Structures avec équipes terrain"
      6: "Porteurs de projet qui veulent structurer leur présence digitale"

  zones:
    title: "Où on intervient"
    subtitle: "MassGrafik est basé à Paris et intervient à distance sur trois zones principales."
    paris:
      title: "Paris & Île-de-France"
      desc: "Basé à Paris, MassGrafik accompagne en priorité les artisans, commerçants, TPE et associations d'Île-de-France. Des rendez-vous en présentiel sont possibles sur demande. La majorité des projets se déroule entièrement à distance, sans perte de qualité ni de suivi."
    spain:
      title: "Espagne"
      desc: "MassGrafik accompagne les porteurs de projet, commerçants et petites structures établis en Espagne Toutes les interventions se font à distance, en français, espagnol ou wolof selon le besoin."
    senegal:
      title: "Sénégal"
      desc: "Sénégal, avec pour objectif d'accompagner les PME locales et de répondre aux appels d'offres publics (ARMP). En attendant, MassGrafik intervient déjà dans des projets sénégalais portés depuis la diaspora ou localement."

  cta:
    title: "Un projet en tête ?"
    subtitle: "Décrivez votre besoin en quelques mots. On vous répond sous 48 h avec une première orientation."
    button: "Parler de mon projet"

