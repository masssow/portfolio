# ===================================================================
# ACCUEIL
# ===================================================================
home:
  seo:
    titleTab: "MassGrafik — Solutions digitales pour petites structures"
    metaDesc: "Sites professionnels, e-commerce, outils de gestion et automatisations pour artisans, commerçants et petites structures. Basé à Paris, intervient en IDF, Espagne et Sénégal."

  hero:
    salutation: "MassGrafik"
    h1: "On construit votre présence en ligne, vous gérez votre activité"
    subtitle: "Sites professionnels, e-commerce, outils de gestion et automatisations — conçus pour les artisans, commerçants et petites structures."
    proofs: "✅ Réponse sous 48 h ✅ Approche personnalisée ✅ Solutions adaptées à votre budget"

  mirror:
    title: "Vous vous reconnaissez ?"
    subtitle: "Si oui, MassGrafik peut vous aider à changer ça."
    items:
      1:
        title: "Pas de site, ou un site qui ne génère aucun contact"
        text: "Vos clients potentiels ne vous trouvent pas — ou repartent sans agir."
      2:
        title: "Des outils dispersés qui font perdre du temps"
        text: "Excel, WhatsApp, papier... les informations se perdent et la coordination est difficile."
      3:
        title: "Vous voulez vendre en ligne mais ne savez pas par où commencer"
        text: "La mise en place semble compliquée, coûteuse, et vous ne savez pas quoi prioriser."
      4:
        title: "Des équipes terrain difficiles à coordonner"
        text: "Le suivi des interventions, des statuts et des échanges est difficile à centraliser."

  solutions:
    title: "Ce que MassGrafik peut faire pour vous"
    subtitle: "Des solutions concrètes, adaptées à votre réalité."
    web:
      title: "Sites professionnels"
      desc: "Un site clair pour présenter votre activité, rassurer vos clients et générer des contacts."
    ecom:
      title: "E-commerce"
      desc: "Une boutique en ligne simple pour vendre vos produits ou services facilement."
    tools:
      title: "Outils de gestion"
      desc: "Des outils sur mesure pour mieux suivre votre activité, vos clients et vos interventions."
    auto:
      title: "Automatisations"
      desc: "Simplifiez les tâches répétitives : confirmations, notifications, suivi de statut."
    terrain:
      title: "Suivi terrain"
      desc: "Créez, affectez et suivez vos interventions entre bureau et équipes en temps réel."
    accomp:
      title: "Accompagnement digital"
      desc: "Clarifiez votre besoin, priorisez les actions et construisez progressivement."
    booking:
      title: "Réservations en ligne"
      desc: "Vos clients prennent rendez-vous directement — confirmations et rappels automatiques."
    operations:
      title: "Maintenance & suivi"
      desc: "Votre site toujours en ligne, à jour et performant — on s'occupe du reste."

  method:
    title: "Comment on travaille"
    steps:
      1:
        num: "01"
        title: "On comprend votre activité"
        desc: "Un échange de 30 minutes pour comprendre votre contexte, vos contraintes et vos priorités — avant de parler de budget."
      2:
        num: "02"
        title: "On propose une solution claire"
        desc: "Une proposition lisible et honnête. Ce qui est inclus, ce qui ne l'est pas, et un délai réaliste."
      3:
        num: "03"
        title: "On construit et on accompagne"
        desc: "Livraison progressive, transfert de propriété complet, formation simple si besoin."

  badge:
    large: "48 h"
    small: "délai de réponse"

  zones:
    title: "Zones d'intervention :"
    list: "Paris / Île-de-France · Espagne · Sénégal — 100 % à distance possible."

  packs:
    title: "Nos offres"
    intro: "Des points de départ clairs pour avancer sans hésiter."

  cta_center:
    title: "Avant de parler de budget, faisons le point."
    subtitle: "30 minutes pour clarifier votre objectif, vos priorités et les premières actions utiles."
    button: "Demander un échange gratuit"
    proof: "Sans engagement · Conseils actionnables · Réponse sous 48 h"

