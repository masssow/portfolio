services2:
  intro:
    title: "Des services clairs, utiles et mesurables"
    subtitle: "Nous concevons, mesurons, améliorons. Moins de jargon plus d’appels, de messages et de ventes."
  cards:
    consulting:
      title: "Conseil et stratégie"
      teaser: "Prioriser ce qui compte, maintenant."
      items:
        1: "Diagnostic 360° : messages, parcours, priorités."
        2: "Positionnement et offre : pour qui, pourquoi, quoi."
        3: "Feuille de route : objectifs, jalons et KPI utiles."
    identity:
      title: "Identité et design"
      teaser: "Une image claire qui inspire confiance."
      items:
        1: "Identité visuelle : logo, couleurs, typographies, kit social."
        2: "Design system : blocs réutilisables pour livrer vite."
        3: "UX writing : messages clairs et appels à l’action."
    platforms:
      title: "Sites et plateformes"
      teaser: "Interfaces utiles : crédibilité, information, interaction."
      items:
        1: "Site vitrine, corporate ou institutionnel : crédibilité et contacts."
        2: "Portail d’événements et ticketing : inscriptions, paiements et e-tickets."
        3: "Intranet, extranet ou espace membres : accès sécurisé et documents."
        4: "Salle de presse et documentation : publier, classer, rechercher."
    commerce:
      title: "Commerce et paiements"
      teaser: "Vendre facilement, encaisser sereinement."
      items:
        1: "Boutique en ligne : catalogue, panier et paiement sécurisé avec Stripe."
        2: "Click-and-collect et commandes en ligne : créneaux, retraits, confirmations."
        3: "Abonnements et adhésions : récurrence, reçus et gestion de membres."
        4: "Marketplace multi-vendeurs : onboarding, commissions et paiements."
    booking:
      title: "Réservations et formulaires"
      teaser: "Moins d’allers-retours, plus d’autonomie."
      items:
        1: "Rendez-vous : agenda, rappels par e-mail et SMS, annulations."
        2: "Ticketing et événements : quotas, tarifs, listes et scan à l’entrée."
        3: "Dossiers et candidatures : étapes, pièces jointes et flux simples."
    content_seo:
      title: "Contenus, SEO et visibilité"
      teaser: "Qu’on vous trouve, qu’on vous comprenne et qu’on vous choisisse."
      items:
        1: "SEO technique et éditorial : structure claire et données enrichies."
        2: "Blog et actualités : calendrier éditorial et mise en page propre."
        3: "Newsletters : templates, envois et listes propres avec opt-in."
        4: "Réseaux sociaux : calendrier mensuel, créations et animation."
    acquisition:
      title: "Acquisition et notoriété"
      teaser: "Activer la demande sans brûler le budget."
      items:
        1: "Publicité en ligne : Google Ads et Meta Ads, retargeting simple."
        2: "Landing pages : conversion mesurée et tests A/B raisonnables."
        3: "Pages de preuve : cas, avis et avant/après."
    donations:
      title: "Dons, mécénat et éducation"
      teaser: "Collecter, sensibiliser, former."
      items:
        1: "Dons et campagnes : pages dédiées et reçus automatiques."
        2: "E-learning léger et ressources : parcours simple et quiz."
        3: "Boutique solidaire : packs, bundles et coupons."
    data_crm:
      title: "Données, CRM et automatisation"
      teaser: "Voir clair, relancer juste, gagner du temps."
      items:
        1: "Mini-CRM : centralisation des demandes, pipeline et suivis."
        2: "Automatisations e-mail et SMS : bienvenue, relances, rappels."
        3: "Tableaux de bord : trafic, conversions, ventes et formulaires."
    accessibility:
      title: "Accessibilité, langues et international"
      teaser: "Inclure plus de monde et ouvrir plus de marchés."
      items:
        1: "Accessibilité : bonne lisibilité et contrastes adéquats."
        2: "Multilingue FR, ES, EN : navigation, contenus et SEO par langue."
    performance:
      title: "Performance, sécurité et conformité"
      teaser: "Rapide, fiable et conforme."
      items:
        1: "Performance mobile-first : médias optimisés et cache."
        2: "Sécurité et sauvegardes : mises à jour et restauration."
        3: "RGPD : bandeau cookies, mentions et formulaires conformes."
    operations:
      title: "Exploitation continue"
      teaser: "Un site vivant qui évolue sans douleur."
      items:
        1: "Maintenance et support : corrections et petites améliorations."
        2: "Hébergement et infogérance : SSL, sauvegardes et monitoring."
        3: "Formation et transfert : onboarding et mini-guides."
    creative:
      title: "Production créative"
      teaser: "Montrer le réel : équipes, produits et lieux."
      items:
        1: "Photo et vidéo pour rassurer et convaincre."
        2: "Rédaction et traduction : pages clés et fiches."

